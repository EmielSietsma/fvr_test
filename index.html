<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Info</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 10px; }
        .card { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 6px; box-shadow: 0 3px 10px rgba(0,0,0,.2); }
        .header { background: #1a1a2e; color: #fff; padding: 12px; text-align: center; }
        .header h1 { font-size: 18px; margin: 0; }
        .header p { font-size: 12px; margin: 4px 0 0 0; opacity: .85; }
        .body { padding: 14px; }
        .section { margin: 10px 0; padding: 8px 0; border-bottom: 1px solid #e0e0e0; }
        .section:last-child { border: 0; }
        .section h3 { color: #1a1a2e; font-size: 10px; text-transform: uppercase; font-weight: bold; margin: 0 0 6px 0; }
        .row { display: flex; justify-content: space-between; margin: 3px 0; font-size: 12px; }
        .label { font-weight: bold; color: #333; }
        .value { color: #555; text-align: right; margin-left: 10px; }
        .value[data-unit]::after { content: attr(data-unit); }
        .footer { background: #f5f5f5; padding: 8px 12px; font-size: 10px; color: #999; text-align: center; border-radius: 0 0 6px 6px; }
    </style>
</head>
<body>
    <div class="card">

        <!-- ========================================================
             KOPTEKST — pas hier de bedrijfsnaam en subtitel aan
             ======================================================== -->
        <div class="header">
            <h1>Element Info</h1>
            <p>Timmerfabriek Frank van Roij</p>
        </div>

        <div class="body">

            <!-- =====================================================
                 SECTIE 1: PROJECTGEGEVENS
                 Voeg rijen toe of verwijder ze naar wens.
                 De id="..." verwijst naar de URL-parameternaam.
                 ===================================================== -->
            <div class="section">
                <h3>Project</h3>
                <div class="row"><span class="label">Nummer:</span>       <span class="value" id="projectnummer"></span></div>
                <div class="row"><span class="label">Naam:</span>          <span class="value" id="projectnaam"></span></div>
                <div class="row"><span class="label">Opdrachtgever:</span> <span class="value" id="opdrachtgever"></span></div>
                <div class="row"><span class="label">Locatie:</span>       <span class="value" id="locatie"></span></div>
                <div class="row"><span class="label">Houtkeur:</span>      <span class="value" id="houtkeur"></span></div>
            </div>

            <!-- =====================================================
                 SECTIE 2: ELEMENTGEGEVENS
                 ===================================================== -->
            <div class="section">
                <h3>Element</h3>
                <div class="row"><span class="label">Run:</span>        <span class="value" id="run"></span></div>
                <div class="row"><span class="label">Pakket:</span>     <span class="value" id="pakket"></span></div>
                <div class="row"><span class="label">Merk:</span>       <span class="value" id="merk"></span></div>
                <div class="row"><span class="label">Positie:</span>    <span class="value" id="positie"></span></div>
                <div class="row"><span class="label">Verdieping:</span> <span class="value" id="verdieping"></span></div>
            </div>

            <!-- =====================================================
                 SECTIE 3: TECHNISCHE SPECS
                 ===================================================== -->
            <div class="section">
                <h3>Specificaties</h3>
                <div class="row"><span class="label">Rc-waarde:</span>   <span class="value" id="rc" data-unit=" m²K/W"></span></div>
                <div class="row"><span class="label">Brandklasse:</span> <span class="value" id="brand" data-unit=" min"></span></div>
                <div class="row"><span class="label">KOMO:</span>        <span class="value" id="komo"></span></div>
            </div>

            <!-- =====================================================
                 VOEG HIER EXTRA SECTIES TOE indien gewenst.
                 Gebruik hetzelfde <div class="section"> patroon en
                 geef elk veld een uniek id="" dat overeenkomt met
                 de parameternaam in _build_url() in het Python-script.
                 ===================================================== -->

        </div>

        <!-- ========================================================
             VOETTEKST — pas aan of verwijder naar wens
             ======================================================== -->
        <div class="footer">Timmerfabriek Frank van Roij</div>

    </div>

    <!-- ==============================================================
         JAVASCRIPT — vult automatisch alle velden in vanuit de URL.
         Je hoeft hier niets aan te passen tenzij je een nieuw veld
         toevoegt: voeg dan ook een regel toe in het Python-script
         onder _build_url() én een element met het juiste id="" hierboven.
         ============================================================== -->
    <script>
        const params = new URLSearchParams(window.location.search);
        document.querySelectorAll('.value[id]').forEach(el => {
            el.textContent = params.get(el.id) ?? '-';
        });
        document.title = `Element ${params.get('pakket') ?? ''}`;
    </script>
</body>
</html>
